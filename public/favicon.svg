<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- dark background -->
  <rect width="32" height="32" rx="7" fill="#111118"/>
  <!-- outer ring -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="#7c6af7" stroke-width="1.5" opacity="0.5"/>
  <!-- inner ring -->
  <circle cx="16" cy="16" r="7" fill="none" stroke="#7c6af7" stroke-width="1"/>
  <!-- center dot -->
  <circle cx="16" cy="16" r="2.5" fill="#7c6af7"/>
  <!-- top tick -->
  <line x1="16" y1="2" x2="16" y2="6" stroke="#7c6af7" stroke-width="1.5" stroke-linecap="round"/>
  <!-- bottom tick -->
  <line x1="16" y1="26" x2="16" y2="30" stroke="#7c6af7" stroke-width="1.5" stroke-linecap="round"/>
  <!-- left tick -->
  <line x1="2" y1="16" x2="6" y2="16" stroke="#7c6af7" stroke-width="1.5" stroke-linecap="round"/>
  <!-- right tick -->
  <line x1="26" y1="16" x2="30" y2="16" stroke="#7c6af7" stroke-width="1.5" stroke-linecap="round"/>
</svg>
